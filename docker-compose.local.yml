version: '3.8'

# Local Production Deployment for TWS Robot
# This configuration runs PostgreSQL and Redis locally via Docker
# The TWS Robot application runs directly on the host machine (not containerized)
# to easily connect to TWS running on the same Windows machine

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tws-robot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tws_robot_prod
      POSTGRES_USER: tws_user
      POSTGRES_PASSWORD: tws_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tws_user -d tws_robot_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: tws-robot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tws-robot-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tws-robot.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

volumes:
  postgres_data:
    name: tws_robot_postgres_data
  redis_data:
    name: tws_robot_redis_data
  pgadmin_data:
    name: tws_robot_pgadmin_data

networks:
  default:
    name: tws-robot-network
