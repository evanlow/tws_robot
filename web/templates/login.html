<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TWS Robot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1a2e; }
    .login-card { background: #16213e; padding: 2rem; border-radius: 8px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .login-card h1 { text-align: center; color: #e0e0e0; margin-bottom: 1.5rem; font-size: 1.5rem; }
    .login-card .brand { text-align: center; font-size: 2rem; margin-bottom: 0.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; color: #b0b0b0; margin-bottom: 0.3rem; font-size: 0.9rem; }
    .form-group input { width: 100%; padding: 0.6rem; border: 1px solid #333; border-radius: 4px; background: #0f3460; color: #e0e0e0; font-size: 1rem; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: #e94560; }
    .btn-login { width: 100%; padding: 0.7rem; background: #e94560; border: none; border-radius: 4px; color: #fff; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
    .btn-login:hover { background: #c73e54; }
    .error-msg { background: #3d1515; color: #ff6b6b; padding: 0.5rem; border-radius: 4px; margin-bottom: 1rem; text-align: center; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">⚡</div>
    <h1>TWS Robot Login</h1>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>
</body>
</html>
