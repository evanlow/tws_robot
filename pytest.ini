[pytest]
# Pytest configuration for TWS Robot

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=core
    --cov=data
    --cov=ai
    --cov=strategies
    --cov=backtest
    --cov=risk
    --cov=execution
    --cov=monitoring
    --cov=strategy
    --cov=web
    --cov-report=term-missing
    --cov-report=html:htmlcov

# Directories to search for tests
testpaths = tests

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database or API)
    slow: Slow running tests
    requires_tws: Tests that require TWS connection

# Async configuration
asyncio_default_fixture_loop_scope = function

# Logging
# Disable live logging to avoid test log messages appearing as warnings
# Application logs are still captured, just not displayed during test runs
log_cli = false
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
# Log file for debugging (if needed)
log_file = test_logs.log
log_file_level = DEBUG

# Coverage options
[coverage:run]
source = core,data,strategies,backtest,risk,execution,monitoring,strategy,web
omit = 
    */tests/*
    */venv/*
    */Lib/*
    */Scripts/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
