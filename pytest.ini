[pytest]
# Pytest configuration for TWS Robot

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=core
    --cov=data
    --cov-report=term-missing
    --cov-report=html:htmlcov

# Directories to search for tests
testpaths = tests

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require database or API)
    slow: Slow running tests
    requires_tws: Tests that require TWS connection

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options
[coverage:run]
source = core,data
omit = 
    */tests/*
    */venv/*
    */Lib/*
    */Scripts/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
